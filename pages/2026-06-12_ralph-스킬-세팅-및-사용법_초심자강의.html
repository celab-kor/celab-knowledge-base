<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ralph 스킬 세팅 및 사용법 — 1시간 초심자 강의</title>
<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    --bg:#0E1116;
    --bg-2:#151A21;
    --panel:#1B222C;
    --panel-2:#222B37;
    --ink:#E8ECF2;
    --ink-soft:#AEB8C7;
    --ink-dim:#6F7B8C;
    --line:#2A3340;
    --line-soft:#222b37;
    /* dominant accent — the boulder / torch */
    --amber:#F5A623;
    --amber-soft:#FFC861;
    --amber-deep:#C77F12;
    /* cool secondary — verification / code states */
    --teal:#22D3C5;
    --teal-deep:#0E8C82;
    /* status */
    --good:#34D399;
    --bad:#F87171;
    --good-bg:rgba(52,211,153,.10);
    --bad-bg:rgba(248,113,113,.10);
    --amber-bg:rgba(245,166,35,.10);
    --teal-bg:rgba(34,211,197,.10);
    --radius:16px;
    --radius-sm:10px;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Menlo","Consolas",monospace;
    --sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    --shadow:0 24px 60px -20px rgba(0,0,0,.65);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 82% -10%, rgba(245,166,35,.10), transparent 55%),
      radial-gradient(1000px 620px at 8% 110%, rgba(34,211,197,.08), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.6;
    letter-spacing:-.01em;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ============ STAGE / SLIDES ============ */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .slide{
    position:absolute;inset:0;
    display:none;
    flex-direction:column;
    padding:clamp(36px,4.2vw,80px) clamp(40px,6vw,128px);
    opacity:0;
    transition:opacity .42s ease;
  }
  .slide.active{display:flex;opacity:1;animation:slideIn .5s cubic-bezier(.22,.61,.36,1) both;}
  @keyframes slideIn{from{opacity:0;transform:translateY(14px) scale(.992)}to{opacity:1;transform:none}}

  /* stagger reveal for direct children of .body */
  .slide.active .reveal{opacity:0;animation:rise .5s cubic-bezier(.22,.61,.36,1) forwards;}
  .slide.active .reveal:nth-child(1){animation-delay:.06s}
  .slide.active .reveal:nth-child(2){animation-delay:.13s}
  .slide.active .reveal:nth-child(3){animation-delay:.20s}
  .slide.active .reveal:nth-child(4){animation-delay:.27s}
  .slide.active .reveal:nth-child(5){animation-delay:.34s}
  .slide.active .reveal:nth-child(6){animation-delay:.41s}
  .slide.active .reveal:nth-child(7){animation-delay:.48s}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  /* ============ SLIDE HEADER ============ */
  .badge-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .badge{
    font-family:var(--mono);font-size:clamp(12px,1vw,14px);font-weight:600;
    padding:6px 13px;border-radius:999px;letter-spacing:.02em;
    border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:8px;
  }
  .badge.mod-a{border-color:rgba(245,166,35,.4);color:var(--amber-soft);background:var(--amber-bg)}
  .badge.mod-b{border-color:rgba(34,211,197,.4);color:var(--teal);background:var(--teal-bg)}
  .badge.mod-c{border-color:rgba(167,139,250,.45);color:#C4B5FD;background:rgba(167,139,250,.10)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}

  h1.slide-title{
    font-size:clamp(28px,3.5vw,52px);
    font-weight:760;line-height:1.12;letter-spacing:-.025em;
    margin-bottom:8px;
  }
  h1.slide-title .hl{color:var(--amber)}
  .subtitle{color:var(--ink-soft);font-size:clamp(15px,1.35vw,21px);margin-bottom:6px}

  .body{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:clamp(12px,1.5vw,20px);padding-top:8px;overflow:auto}
  .body::-webkit-scrollbar{width:8px}
  .body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  /* ============ CARDS / LISTS ============ */
  .grid{display:grid;gap:clamp(12px,1.4vw,18px)}
  .grid.cols-2{grid-template-columns:1fr 1fr}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:900px){.grid.cols-2,.grid.cols-3{grid-template-columns:1fr}}

  .card{
    background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:clamp(16px,1.7vw,24px);
    position:relative;
  }
  .card.accent{border-color:rgba(245,166,35,.35)}
  .card.teal{border-color:rgba(34,211,197,.35)}
  .card h3{font-size:clamp(17px,1.5vw,22px);font-weight:680;margin-bottom:10px;display:flex;align-items:center;gap:10px}
  .card .lead-icon{font-size:1.25em;filter:saturate(1.1)}

  ul.feat{list-style:none;display:flex;flex-direction:column;gap:11px}
  ul.feat li{
    position:relative;padding-left:28px;
    font-size:clamp(15px,1.32vw,20px);color:var(--ink-soft);line-height:1.5;
  }
  ul.feat li::before{
    content:"";position:absolute;left:6px;top:.62em;
    width:8px;height:8px;border-radius:2px;background:var(--amber);
    box-shadow:0 0 0 4px var(--amber-bg);
  }
  ul.feat.teal li::before{background:var(--teal);box-shadow:0 0 0 4px var(--teal-bg)}
  ul.feat li strong{color:var(--ink);font-weight:680}
  ul.feat li em{color:var(--amber-soft);font-style:normal;font-weight:600}

  .note-inline{color:var(--ink-soft);font-size:clamp(14px,1.2vw,18px);line-height:1.6}
  .note-inline strong{color:var(--ink)}

  /* ============ CODE ============ */
  pre{
    background:#0A0D12;border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:clamp(14px,1.5vw,22px) clamp(16px,1.7vw,24px);
    font-family:var(--mono);font-size:clamp(13px,1.05vw,16.5px);line-height:1.7;
    overflow:auto;letter-spacing:0;color:#D6DEEA;position:relative;
  }
  pre::before{
    content:attr(data-label);position:absolute;top:0;right:0;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-dim);background:var(--panel);
    padding:3px 12px;border-bottom-left-radius:8px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);
    font-weight:600;
  }
  pre .cm{color:#5B6877;font-style:italic}      /* comment */
  pre .kw{color:var(--amber-soft);font-weight:600}/* keyword/cmd */
  pre .st{color:var(--teal)}                      /* string */
  pre .pa{color:#C4B5FD}                           /* path */
  pre .nm{color:#7FB4FF}                           /* number/key */
  pre .ar{color:var(--amber);font-weight:700}      /* arrow */
  pre .ok{color:var(--good)}
  pre .no{color:var(--bad)}

  code.ic{
    font-family:var(--mono);font-size:.9em;background:var(--panel-2);
    border:1px solid var(--line);border-radius:6px;padding:1px 7px;color:var(--amber-soft);
    white-space:nowrap;
  }

  /* ============ TABLES ============ */
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:clamp(13.5px,1.2vw,18px)}
  table th,table td{padding:11px 16px;text-align:left;border-bottom:1px solid var(--line)}
  table th{
    background:var(--panel);color:var(--ink);font-weight:680;font-size:.92em;
    letter-spacing:.01em;border-bottom:1px solid var(--line);
  }
  table tr td:first-child,table tr th:first-child{padding-left:18px}
  table td{color:var(--ink-soft)}
  table td code{font-family:var(--mono);color:var(--amber-soft);font-size:.92em}
  table tr:last-child td{border-bottom:none}
  .tbl-wrap{border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-2)}
  .yes{color:var(--good);font-weight:700}
  .no{color:var(--bad);font-weight:700}
  tr.row-yes td:first-child{color:var(--good)}
  tr.row-no td:first-child{color:var(--bad)}

  /* ============ CALLOUT / QUOTE ============ */
  .callout{
    border-left:4px solid var(--amber);
    background:var(--amber-bg);
    border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    padding:16px 22px;font-size:clamp(15px,1.35vw,21px);color:var(--ink);
  }
  .callout.teal{border-left-color:var(--teal);background:var(--teal-bg)}
  .callout strong{color:var(--amber-soft)}
  .callout.teal strong{color:var(--teal)}

  /* checklist */
  ul.check{list-style:none;display:flex;flex-direction:column;gap:10px}
  ul.check li{position:relative;padding-left:36px;font-size:clamp(15px,1.3vw,20px);color:var(--ink-soft)}
  ul.check li::before{
    content:"";position:absolute;left:0;top:.1em;width:22px;height:22px;
    border:2px solid var(--line);border-radius:6px;background:var(--bg-2);
  }
  ul.check li::after{
    content:"";position:absolute;left:7px;top:.28em;width:7px;height:12px;
    border:solid var(--amber);border-width:0 3px 3px 0;transform:rotate(42deg);opacity:.85;
  }

  /* ============ COVER ============ */
  .cover{align-items:flex-start;justify-content:center}
  .cover .kicker{
    font-family:var(--mono);color:var(--amber);letter-spacing:.16em;text-transform:uppercase;
    font-size:clamp(12px,1.1vw,15px);font-weight:600;margin-bottom:22px;display:flex;align-items:center;gap:12px;
  }
  .cover h1{
    font-size:clamp(40px,6.4vw,98px);font-weight:800;line-height:1.02;letter-spacing:-.03em;margin-bottom:8px;
  }
  .cover h1 .ralph{
    background:linear-gradient(120deg,var(--amber),var(--amber-soft) 60%,var(--teal));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .cover .lede{font-size:clamp(17px,1.9vw,28px);color:var(--ink-soft);max-width:24ch;margin:18px 0 30px;line-height:1.45}
  .cover .meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:30px}
  .pill{
    border:1px solid var(--line);background:var(--panel);border-radius:999px;
    padding:9px 18px;font-size:clamp(13px,1.15vw,17px);color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);
  }
  .pill b{color:var(--amber);font-weight:700}
  .pill.teal b{color:var(--teal)}
  .kbd-hint{display:flex;gap:18px;flex-wrap:wrap;color:var(--ink-dim);font-size:clamp(12.5px,1.05vw,15px)}
  .kbd-hint span{display:inline-flex;align-items:center;gap:7px}
  kbd{
    font-family:var(--mono);font-size:.82em;background:var(--panel-2);border:1px solid var(--line);
    border-bottom-width:2px;border-radius:6px;padding:2px 8px;color:var(--ink);min-width:22px;text-align:center;display:inline-block;
  }

  /* boulder motif on cover */
  .boulder{
    position:absolute;right:clamp(40px,7vw,150px);top:50%;transform:translateY(-50%);
    width:clamp(180px,24vw,360px);height:clamp(180px,24vw,360px);pointer-events:none;opacity:.9;
  }
  @media(max-width:1100px){.boulder{opacity:.18;right:0}}
  .boulder .ring{
    position:absolute;inset:0;border-radius:50%;
    border:1.5px dashed rgba(245,166,35,.35);
    animation:spin 26s linear infinite;
  }
  .boulder .ring2{inset:18%;border-color:rgba(34,211,197,.3);animation-duration:18s;animation-direction:reverse}
  .boulder .core{
    position:absolute;inset:30%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--amber-soft),var(--amber-deep) 70%,#5b3a08);
    box-shadow:0 0 60px rgba(245,166,35,.5),inset -10px -12px 30px rgba(0,0,0,.45);
    animation:bob 4s ease-in-out infinite;
  }
  .boulder .glyph{
    position:absolute;inset:30%;display:flex;align-items:center;justify-content:center;
    font-size:clamp(40px,7vw,96px);filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));animation:bob 4s ease-in-out infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  /* ============ SECTION DIVIDER ============ */
  .section-slide{align-items:flex-start;justify-content:center}
  .section-slide .sec-num{
    font-family:var(--mono);font-size:clamp(60px,12vw,180px);font-weight:800;line-height:.9;
    -webkit-text-stroke:2px var(--amber);color:transparent;opacity:.85;letter-spacing:-.04em;margin-bottom:10px;
  }
  .section-slide.b .sec-num{-webkit-text-stroke-color:var(--teal)}
  .section-slide.c .sec-num{-webkit-text-stroke-color:#A78BFA}
  .section-slide h1{font-size:clamp(34px,5.2vw,80px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:14px}
  .section-slide .sec-desc{font-size:clamp(16px,1.7vw,26px);color:var(--ink-soft);max-width:38ch;line-height:1.5;margin-bottom:24px}
  .sec-meta{display:flex;gap:14px;flex-wrap:wrap}
  .sec-meta .pill b{color:inherit}

  /* agenda */
  .agenda-list{display:flex;flex-direction:column;gap:14px;counter-reset:ag}
  .agenda-item{
    display:flex;align-items:center;gap:20px;padding:16px 22px;
    background:linear-gradient(90deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:var(--radius-sm);
    transition:transform .2s;
  }
  .agenda-item .ag-num{
    font-family:var(--mono);font-size:clamp(20px,2vw,30px);font-weight:800;color:var(--amber);min-width:1.6em;
  }
  .agenda-item.b .ag-num{color:var(--teal)}
  .agenda-item.c .ag-num{color:#A78BFA}
  .agenda-item .ag-body{flex:1}
  .agenda-item .ag-title{font-size:clamp(17px,1.6vw,24px);font-weight:680;color:var(--ink)}
  .agenda-item .ag-sub{font-size:clamp(13px,1.1vw,16px);color:var(--ink-dim)}
  .agenda-item .ag-time{font-family:var(--mono);font-size:clamp(13px,1.1vw,16px);color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);padding:5px 13px;border-radius:999px}

  /* flow diagram (ASCII-ish but styled) */
  .flow{display:flex;flex-direction:column;align-items:center;gap:8px;font-family:var(--mono)}
  .flow .node{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 20px;font-size:clamp(13px,1.1vw,17px);color:var(--ink);text-align:center;font-weight:600;
  }
  .flow .node.amber{border-color:var(--amber);color:var(--amber-soft);background:var(--amber-bg)}
  .flow .node.teal{border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}
  .flow .arr{color:var(--amber);font-size:1.2em}
  .flow .branch{font-size:clamp(12px,1vw,15px);color:var(--ink-dim)}

  /* ============ INSTRUCTOR NOTES PANEL ============ */
  #notesPanel{
    position:fixed;right:0;top:0;bottom:0;width:min(440px,40vw);
    background:linear-gradient(180deg,#10151C,#0B0E13);
    border-left:1px solid var(--line);box-shadow:var(--shadow);
    transform:translateX(102%);transition:transform .34s cubic-bezier(.4,0,.2,1);
    z-index:60;display:flex;flex-direction:column;padding:28px 30px;
  }
  #notesPanel.open{transform:none}
  #notesPanel .np-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line)}
  #notesPanel .np-head .ico{
    width:38px;height:38px;border-radius:10px;background:var(--amber-bg);border:1px solid rgba(245,166,35,.4);
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  #notesPanel .np-head h4{font-size:18px;font-weight:720;color:var(--ink)}
  #notesPanel .np-head .np-sub{font-size:12.5px;color:var(--ink-dim);font-family:var(--mono)}
  #notesBody{overflow:auto;flex:1;font-size:16px;line-height:1.72;color:var(--ink-soft)}
  #notesBody::-webkit-scrollbar{width:7px}
  #notesBody::-webkit-scrollbar-thumb{background:var(--line);border-radius:7px}
  #notesBody p{margin-bottom:14px}
  #notesBody strong{color:var(--amber-soft)}
  .np-foot{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-dim);font-family:var(--mono);display:flex;justify-content:space-between}

  /* ============ OVERVIEW GRID ============ */
  #overview{
    position:fixed;inset:0;background:rgba(8,10,14,.97);z-index:80;
    display:none;flex-direction:column;padding:clamp(24px,3vw,56px);overflow:auto;
  }
  #overview.open{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  #overview h3{font-size:24px;font-weight:740;margin-bottom:6px}
  #overview .ov-sub{color:var(--ink-dim);font-family:var(--mono);font-size:13px;margin-bottom:24px}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .ov-card{
    aspect-ratio:16/10;background:linear-gradient(160deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;transition:.2s;position:relative;overflow:hidden;
  }
  .ov-card:hover{border-color:var(--amber);transform:translateY(-3px);box-shadow:0 14px 30px -12px rgba(245,166,35,.4)}
  .ov-card.current{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-bg)}
  .ov-card .ov-idx{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
  .ov-card .ov-t{font-size:15px;font-weight:680;color:var(--ink);line-height:1.3;letter-spacing:-.01em}
  .ov-card .ov-tag{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:999px;align-self:flex-start;border:1px solid var(--line);color:var(--ink-soft)}
  .ov-card .ov-tag.a{color:var(--amber-soft);border-color:rgba(245,166,35,.4)}
  .ov-card .ov-tag.b{color:var(--teal);border-color:rgba(34,211,197,.4)}
  .ov-card .ov-tag.c{color:#C4B5FD;border-color:rgba(167,139,250,.4)}

  /* ============ HELP OVERLAY ============ */
  #help{
    position:fixed;inset:0;background:rgba(8,10,14,.9);z-index:90;display:none;
    align-items:center;justify-content:center;backdrop-filter:blur(4px);
  }
  #help.open{display:flex;animation:fade .2s ease}
  .help-card{
    background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);
    border-radius:20px;padding:40px 46px;max-width:580px;width:90%;box-shadow:var(--shadow);
  }
  .help-card h3{font-size:24px;font-weight:760;margin-bottom:6px}
  .help-card .hc-sub{color:var(--ink-dim);margin-bottom:24px;font-size:14px}
  .help-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
  .help-grid div{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-soft)}
  .help-grid .keys{display:flex;gap:5px;min-width:118px}
  .help-close{margin-top:26px;text-align:center;color:var(--ink-dim);font-size:13px;font-family:var(--mono)}

  /* ============ BOTTOM CONTROL BAR ============ */
  #bar{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:linear-gradient(0deg,rgba(10,13,18,.97),rgba(10,13,18,.78) 70%,transparent);
    padding:14px clamp(24px,3vw,56px) 16px;
    display:flex;align-items:center;gap:18px;
  }
  #progress{position:absolute;left:0;top:0;height:3px;background:linear-gradient(90deg,var(--amber),var(--teal));width:0;transition:width .35s ease;box-shadow:0 0 12px rgba(245,166,35,.5)}
  .ctrl-btn{
    width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink-soft);font-size:17px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;justify-content:center;
  }
  .ctrl-btn:hover{border-color:var(--amber);color:var(--amber-soft);background:var(--panel-2)}
  .ctrl-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
  .counter{font-family:var(--mono);font-size:15px;color:var(--ink-soft);min-width:74px;text-align:center;letter-spacing:.02em}
  .counter b{color:var(--amber);font-size:1.18em}
  .bar-title{flex:1;font-size:14px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
  .bar-spacer{flex:1}
  .bar-group{display:flex;gap:9px;align-items:center}

  /* timer */
  #timer{

push({ type:'content', mod:'b', badge:'모듈 B · 1/10', title:'ralph란 무엇인가 — 한 줄 정의',
  html:`
  <div class="reveal callout teal" style="font-size:clamp(18px,1.9vw,28px);text-align:center;border-left:none;border-top:3px solid var(--teal)">ralph는 <strong>PRD 주도 지속 루프(persistence loop)</strong> 다.</div>

  </div>`,

push({ type:'content', mod:'b', badge:'모듈 B · 2/10', title:'PRD 주도 루프란? — 체크리스트를 다 채울 때까지',
  html:`
  <div class="grid cols-2" style="align-items:start">
    <div class="reveal card teal"><h3><span class="lead-icon">📋</span>PRD = 해야 할 일 체크리스트</h3>
      <ul class="feat teal"><li><strong>PRD</strong>(Product Requirements Document) = 할 일 체크리스트라 생각</li><li>ralph는 <code class="ic">prd.json</code>의 <strong>모든 항목이 체크될 때까지</strong> 반복</li><li>각 유저스토리에 "이 조건이면 완료"라는 <strong>수용기준</strong>이 달림</li><li>체크리스트가 다 차면 <strong>리뷰어에게 최종 검토</strong> 요청</li><li>리뷰어가 승인해야 비로소 루프 종료</li></ul></div>
    <div class="reveal callout"><strong>비유:</strong> prd.json은 레시피 체크리스트이고, ralph는 모든 단계를 직접 맛보며 확인하는 요리사입니다. 모든 단계가 "합격"이어야 다음으로 넘어갑니다.</div>
  </div>`,
  note:`<p>"PRD"라는 용어가 생소해도 걱정 마세요. ralph를 쓸 때는 그냥 "내가 원하는 결과물 목록"이라고 이해하면 충분합니다. ralph가 prd.json 초안을 자동으로 만들어주기 때문에 처음부터 직접 작성하지 않아도 됩니다. 중요한 건 그 항목들의 수용기준을 얼마나 구체적으로 적느냐입니다.</p>`
});

push({ type:'content', mod:'b', badge:'모듈 B · 3/10', title:'핵심 파일 2개: prd.json과 progress.txt',
  html:`
  <div class="grid cols-2" style="align-items:start">
    <div class="reveal">
      <ul class="feat teal" style="margin-bottom:16px"><li><code class="ic">prd.json</code> — 유저스토리 + 수용기준 체크리스트</li><li><code class="ic">progress.txt</code> — 반복마다 진행상황·배운 점 메모장</li><li>저장 경로: <code class="ic">.omc/state/sessions/{sessionId}/</code></li><li>시작 시 prd.json 초안 <strong>자동 생성</strong> — 직접 만들 필요 없음</li></ul>
    </div>
    <div class="reveal"><pre data-label="prd.json (미니 예시)">{
  <span class="nm">"stories"</span>: [{
    <span class="nm">"id"</span>: <span class="st">"S-01"</span>,
    <span class="nm">"title"</span>: <span class="st">"로그인 API 구현"</span>,
    <span class="nm">"acceptance_criteria"</span>: [
      <span class="st">"POST /api/login → 올바른 자격증명에 200"</span>,
      <span class="st">"잘못된 비밀번호에 401 반환"</span>,
      <span class="st">"tests/test_login.py 존재하고 통과"</span>
    ],
    <span class="nm">"passes"</span>: <span class="no">false</span>
  }]
}</pre></div>
  </div>`,
  note:`<p>두 파일 위치를 외울 필요는 없습니다. ralph가 알아서 관리합니다. 다만 "내 진행 상황이 어디 있지?" 궁금할 때 이 경로를 찾아보면 된다는 것만 기억하세요. progress.txt는 특히 루프가 여러 번 돌 때 "지난번에 뭘 시도했고 왜 실패했는지"를 기록해 다음 시도에 활용됩니다.</p>`
});

push({ type:'content', mod:'b', badge:'모듈 B · 4/10', title:'수용기준이 ralph의 생명이다',
  html:`
  <div class="reveal callout">수용기준이 막연하면 ralph는 아무것도 검증할 수 없다 → <strong>"PRD 연극(PRD theater)" 안티패턴.</strong> 막연한 기준은 AI가 스스로 "됐다"고 선언하게 만드는 함정입니다.</div>
  <div class="grid cols-2">

<span class="ok">  HTTP 200과 JWT 반환</span>
<span class="ok">- 잘못된 비밀번호 → HTTP 401과</span>
<span class="ok">  {"error":"invalid_credentials"}</span>
<span class="ok">- tests/test_login.py 존재 &amp;</span>

  note:`<p>"구현 완료"처럼 주관적인 기준은 AI도, 사람도 확인할 방법이 없습니다. 반면 "함수가 X 입력에 Y를 반환한다", "테스트 파일이 존재하고 통과한다"는 실제로 실행해서 참/거짓을 판단할 수 있죠. ralph는 코드를 읽는 게 아니라 실제로 실행해서 통과 여부를 판단합니다. 기준이 흐릿하면 ralph도 속습니다.</p>`
});

push({ type:'content', mod:'b', badge:'모듈 B · 5/10', title:'ralph 실행 사이클 한 바퀴',

push({ type:'content', mod:'b', badge:'모듈 B · 7/10', title:'디슬롭 + 회귀 재검증 — "완성 후 청소"',

/* =====================================================================
   RENDERER
   ===================================================================== */
const stage = document.getElementById('stage');
const modName = {a:'모듈 A',b:'모듈 B',c:'모듈 C'};

S.forEach((s,i)=>{
  let el;
  if(s.type==='cover' || s.type==='final'){
    const wrap=document.createElement('div');
    wrap.innerHTML=s.html.trim();
    el=wrap.firstElementChild;
  } else if(s.type==='section'){
    el=document.createElement('section');
    el.className='slide section-slide '+s.sec;
    el.innerHTML=`<div class="body" style="justify-content:center">
        <div class="reveal badge-row"><span class="badge mod-${s.sec}"><span class="dot"></span>SECTION</span></div>
        <div class="reveal sec-num">${s.num}</div>
        <h1 class="reveal">${s.title}</h1>
        <p class="reveal sec-desc">${s.desc}</p>
        <div class="reveal sec-meta">${s.metaHtml}</div>
      </div>`;
  } else {
    el=document.createElement('section');
    el.className='slide';
    const badgeCls = s.mod ? 'mod-'+s.mod : '';
    const title = s.titleHtml || s.title;
    el.innerHTML=`
      <div class="badge-row">
        <span class="badge ${badgeCls}"><span class="dot"></span>${s.badge}</span>
      </div>
      <h1 class="slide-title">${title}</h1>
      <div class="body">${s.html}</div>`;
  }
  el.dataset.idx=i;
  stage.appendChild(el);
});

const slides=[...document.querySelectorAll('.slide')];
const TOTAL=slides.length;
document.getElementById('totNum').textContent=TOTAL;

/* =====================================================================
   PLAYER STATE & NAV
   ===================================================================== */
let cur=0;
const $=(id)=>document.getElementById(id);

function shortTitle(i){
  const s=S[i];
  if(s.type==='cover')return 'ralph 스킬 세팅 및 사용법';
  if(s.type==='section')return s.title;
  if(s.type==='final')return '정리 & Q&A';
  return s.title;
}

function render(){
  slides.forEach((sl,i)=>sl.classList.toggle('active',i===cur));
  $('curNum').textContent=cur+1;
  $('progress').style.width=((cur)/(TOTAL-1)*100)+'%';
  $('barTitle').textContent=shortTitle(cur);
  // notes
  const note=S[cur].note||'<p style="color:var(--ink-dim)">이 슬라이드에는 강사 노트가 없습니다.</p>';
  $('notesBody').innerHTML=note;
  $('notesPageRef').textContent=(cur+1)+' / '+TOTAL;
  // overview highlight
  document.querySelectorAll('.ov-card').forEach((c,i)=>c.classList.toggle('current',i===cur));
  // hash
  if(location.hash!=='#'+cur) history.replaceState(null,'','#'+cur);
}

function go(n){
  cur=Math.max(0,Math.min(TOTAL-1,n));
  render();
}
const next=()=>go(cur+1);
const prev=()=>go(cur-1);

/* =====================================================================
   OVERVIEW GRID
   ===================================================================== */
const ovGrid=$('ovGrid');
S.forEach((s,i)=>{
  const card=document.createElement('div');
  card.className='ov-card';
  let tag='', tagcls='';
  if(s.type==='cover'){tag='COVER'}
  else if(s.type==='final'){tag='Q&A'}
  else if(s.type==='section'){tag=modName[s.sec]||'SECTION';tagcls=s.sec}
  else if(s.mod){tag=modName[s.mod];tagcls=s.mod}
  else {tag='AGENDA'}
  card.innerHTML=`<div class="ov-idx">${String(i+1).padStart(2,'0')}</div>
    <div class="ov-t">${shortTitle(i)}</div>
    <div class="ov-tag ${tagcls}">${tag}</div>`;
  card.addEventListener('click',()=>{go(i);toggleOverview(false);});
  ovGrid.appendChild(card);
});

/* =====================================================================
   TOGGLES
   ===================================================================== */
function toggleNotes(force){
  const p=$('notesPanel');
  const on= force!==undefined?force:!p.classList.contains('open');
  p.classList.toggle('open',on);
  p.setAttribute('aria-hidden',!on);
  $('notesBtn').classList.toggle('on',on);
}
function toggleOverview(force){
  const o=$('overview');
  const on= force!==undefined?force:!o.classList.contains('open');
  o.classList.toggle('open',on);
  o.setAttribute('aria-hidden',!on);
  $('ovBtn').classList.toggle('on',on);
}
function toggleHelp(force){
  const h=$('help');
  const on= force!==undefined?force:!h.classList.contains('open');
  h.classList.toggle('open',on);
  h.setAttribute('aria-hidden',!on);
}
function toggleFs(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen?.();}
  else{document.exitFullscreen?.();}
}
document.addEventListener('fullscreenchange',()=>{
  $('fsBtn').classList.toggle('on',!!document.fullscreenElement);
});

/* =====================================================================
   TIMER
   ===================================================================== */
let tStart=null, tElapsed=0, tInt=null;
function fmt(ms){
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60), ss=s%60;
  return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
function tick(){ $('timerText').textContent=fmt(tElapsed+(tStart?Date.now()-tStart:0)); }
function timerToggle(){
  const el=$('timer');
  if(tStart){ // pause
    tElapsed+=Date.now()-tStart; tStart=null;
    clearInterval(tInt); el.classList.remove('running');
  } else { // start
    tStart=Date.now(); el.classList.add('running');
    tInt=setInterval(tick,250); tick();
  }
}
function timerReset(){
  tStart=null;tElapsed=0;clearInterval(tInt);
  $('timer').classList.remove('running');$('timerText').textContent='00:00';
}
$('timer').addEventListener('click',timerToggle);
$('timer').addEventListener('dblclick',(e)=>{e.preventDefault();timerReset();});

/* =====================================================================
   EVENTS
   ===================================================================== */
$('prevBtn').addEventListener('click',prev);
$('nextBtn').addEventListener('click',next);
$('notesBtn').addEventListener('click',()=>toggleNotes());
$('ovBtn').addEventListener('click',()=>toggleOverview());
$('fsBtn').addEventListener('click',toggleFs);
$('helpBtn').addEventListener('click',()=>toggleHelp());
$('overview').addEventListener('click',(e)=>{if(e.target.id==='overview')toggleOverview(false);});
$('help').addEventListener('click',()=>toggleHelp(false));

document.addEventListener('keydown',(e)=>{
  // if help open, any key closes
  if($('help').classList.contains('open')){ toggleHelp(false); e.preventDefault(); return; }
  switch(e.key){
    case 'ArrowRight': case 'PageDown': case ' ': case 'Spacebar':
      e.preventDefault(); next(); break;
    case 'ArrowLeft': case 'PageUp':
      e.preventDefault(); prev(); break;
    case 'Home': e.preventDefault(); go(0); break;
    case 'End': e.preventDefault(); go(TOTAL-1); break;
    case 'n': case 'N': case 'ㅜ': toggleNotes(); break;
    case 'o': case 'O': case 'ㅐ': toggleOverview(); break;
    case 'f': case 'F': case 'ㄹ': toggleFs(); break;
    case 't': case 'T': case 'ㅅ': timerToggle(); break;
    case '?': toggleHelp(); break;
    case 'Escape':
      toggleOverview(false); toggleHelp(false);
      if($('notesPanel').classList.contains('open')) toggleNotes(false);
      break;
  }
});

// swipe (touch / laptop trackpad)
let touchX=null;
stage.addEventListener('touchstart',e=>touchX=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>60){ dx<0?next():prev(); }
  touchX=null;
},{passive:true});

// deep-link restore
function fromHash(){
  const n=parseInt(location.hash.replace('#',''),10);
  if(!isNaN(n)&&n>=0&&n<TOTAL) cur=n;
}
window.addEventListener('hashchange',()=>{ fromHash(); render(); });

fromHash();
render();
</script>
</body>
</html>
