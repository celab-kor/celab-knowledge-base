<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScale 전략회의 v2.0</title>
<style>
:root{--navy:#1e3c72;--navy2:#2a5298;--green:#32B489;--orange:#f39c12;--red:#e74c3c;--purple:#8e44ad;--teal:#00796B;--gold:#F9A825}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a2a3a;line-height:1.7}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:40px;border-radius:12px;margin-bottom:24px}
header h1{font-size:1.8em;margin-bottom:8px}
.badge{display:inline-block;background:var(--green);color:#fff;padding:4px 12px;border-radius:20px;font-size:.8em;margin-bottom:12px}
.hmeta{display:flex;gap:16px;flex-wrap:wrap;font-size:.85em;opacity:.85;margin-top:12px}
.warn{background:#fff3cd;border-left:4px solid var(--orange);padding:12px 16px;margin-bottom:20px;border-radius:0 8px 8px 0;font-size:.9em}
.section{background:#fff;border-radius:12px;padding:28px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.section h2{font-size:1.2em;color:var(--navy);border-bottom:2px solid var(--green);padding-bottom:8px;margin-bottom:20px}
.pb{display:inline-block;color:#fff;padding:3px 10px;border-radius:12px;font-size:.8em;font-weight:700;margin-right:8px}
.bubble{background:#f8fafc;border-left:3px solid #ddd;padding:14px;margin:12px 0;border-radius:0 8px 8px 0}
.ibox{padding:14px 16px;border-radius:8px;margin:12px 0}
.ibox.green{background:#e8f5e9;border-left:4px solid #4caf50}
.ibox.orange{background:#fff3e0;border-left:4px solid var(--orange)}
.ibox.blue{background:#e3f2fd;border-left:4px solid #1976d2}
.ibox.gold{background:#fffde7;border-left:4px solid var(--gold)}
.ibox.navy{background:#e8eaf6;border-left:4px solid var(--navy)}
.ibox.teal{background:#e0f2f1;border-left:4px solid var(--teal)}
table{width:100%;border-collapse:collapse;margin:12px 0}
th{background:var(--navy);color:#fff;padding:10px;text-align:left}
td{padding:9px 10px;border-bottom:1px solid #e8ecf0}
tr:nth-child(even) td{background:#f8fafc}
.th{background:#ef5350;color:#fff;padding:2px 8px;border-radius:10px;font-size:.8em}
.tm{background:#fb8c00;color:#fff;padding:2px 8px;border-radius:10px;font-size:.8em}
footer{background:var(--navy);color:#adb5c7;text-align:center;padding:24px;border-radius:12px;margin-top:24px;font-size:.85em}
.ver{margin-top:8px;color:#6a7f96;font-size:.8em}
</style>
</head>
<body>
<div class="container">
<header>
<div class="badge">v2.0 · MTG-CUSTOM</div>
<h1>SnapScale 전략회의 v2.0<br>인화공 실행 심화 &amp; 박규호 Co-Founder 포지셔닝 &amp; 씨드 1억 예산</h1>
<div class="hmeta"><span>📅 2026-05-09</span><span>👥 패널 9인</span><span>🔗 문서 #3 후속</span><span>🔒 Internal Confidential</span></div>
</header>
<div class="warn">⚠️ 본 회의록은 AI 기술을 활용하여 작성되었으며, 일부 정확도가 떨어질 수 있습니다.</div>
