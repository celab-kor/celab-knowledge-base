<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자지주 특강 — 심층 분석 리포트</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --navy: #0d1b2e;
  --navy-mid: #1b2d45;
  --navy-card: #1e3250;
  --gold: #c8a44a;
  --gold-light: #e8d5a3;
  --gold-dim: rgba(200,164,74,0.15);
  --teal: #1a8c7a;
  --teal-light: rgba(26,140,122,0.15);
  --blue: #2563eb;
  --blue-light: rgba(37,99,235,0.15);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.12);
  --amber: #d97706;
  --amber-light: rgba(217,119,6,0.15);
  --purple: #7c3aed;
  --purple-light: rgba(124,58,237,0.15);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.15);
  --text: #e8f0fe;
  --text-muted: rgba(232,240,254,0.55);
  --border: rgba(200,164,74,0.2);
  --card-bg: rgba(30,50,80,0.7);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
  background: var(--navy);
  color: var(--text);
  line-height: 1.7;
}
a { color: var(--gold); }

/* ---- HERO ---- */
.hero {
  min-height: 100vh;
  background: linear-gradient(135deg, #060d1a 0%, #0d1b2e 40%, #0a2040 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 40px;
  position: relative; overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 70px,rgba(200,164,74,0.03) 70px,rgba(200,164,74,0.03) 71px),
    repeating-linear-gradient(90deg,transparent,transparent 70px,rgba(200,164,74,0.03) 70px,rgba(200,164,74,0.03) 71px);
}
.hero-inner { position:relative; z-index:1; text-align:center; max-width:860px; }
.hero-badge {
  display:inline-block; border:1.5px solid var(--gold); color:var(--gold);
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  padding:6px 18px; border-radius:2px; margin-bottom:36px;
}
.hero h1 {
  font-size:clamp(28px,5vw,52px); font-weight:700;
  color:#fff; line-height:1.2; margin-bottom:16px; letter-spacing:-1px;
}
.hero h1 em { color:var(--gold); font-style:normal; }
.hero-sub {
  font-size:16px; color:var(--text-muted); max-width:640px; margin:0 auto 48px;
}
.hero-kpi {
  display:flex; gap:0; flex-wrap:wrap; justify-content:center;
  border:1px solid var(--border); border-radius:6px; overflow:hidden;
  background:rgba(255,255,255,0.03); backdrop-filter:blur(10px);
}
.kpi-cell {
  padding:20px 28px; text-align:center; border-right:1px solid var(--border);
  min-width:130px;
}
.kpi-cell:last-child { border-right:none; }
.kpi-num { font-size:32px; font-weight:300; color:#fff; line-height:1; margin-bottom:6px; }
.kpi-num span { font-size:16px; }
.kpi-label { font-size:11px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; }

/* ---- NAV ---- */
.sticky-nav {
  position:sticky; top:0; z-index:100;
  background:rgba(13,27,46,0.97); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; gap:0; overflow-x:auto; padding:0 32px;
}
.sticky-nav a {
  color:var(--text-muted); text-decoration:none;
  padding:14px 16px; font-size:12px; letter-spacing:0.3px;
  white-space:nowrap; border-bottom:2px solid transparent; transition:all 0.2s;
}
.sticky-nav a:hover { color:var(--gold); border-bottom-color:var(--gold); }

/* ---- SECTION ---- */
.section { padding:64px 40px; max-width:1100px; margin:0 auto; }
.section-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.section-title { font-size:clamp(22px,3vw,32px); font-weight:700; color:#fff; margin-bottom:8px; }
.section-desc { font-size:14px; color:var(--text-muted); max-width:680px; margin-bottom:40px; line-height:1.8; }

/* ---- SPEAKER CARD ---- */
.speaker-row { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:40px; }
.speaker-card {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:12px; padding:28px; display:flex; gap:20px; align-items:flex-start;
}
.speaker-avatar {
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; border:2px solid var(--gold);
  background:rgba(200,164,74,0.1);
}
.speaker-info .role { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.speaker-info .name { font-size:18px; font-weight:700; color:#fff; margin-bottom:4px; }
.speaker-info .org { font-size:13px; color:var(--text-muted); }

/* ---- SESSION HEADER ---- */
.session-header {
  background:linear-gradient(135deg, rgba(200,164,74,0.08), rgba(30,50,80,0.6));
  border:1px solid var(--border); border-radius:10px;
  padding:32px; margin-bottom:32px;
  display:flex; gap:24px; align-items:center;
}
.session-num {
  width:64px; height:64px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--gold); display:flex; align-items:center; justify-content:center;
  font-size:24px; font-weight:700; color:var(--gold);
}
.session-meta .session-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.session-meta h3 { font-size:clamp(18px,2.5vw,26px); font-weight:700; color:#fff; margin-bottom:6px; }
.session-meta p { font-size:13px; color:var(--text-muted); }

/* ---- INSIGHT GRID ---- */
.insight-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-bottom:40px; }
.insight-card {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:8px; padding:24px; transition:box-shadow 0.2s;
}
.insight-card:hover { box-shadow:0 0 0 1px rgba(200,164,74,0.4); }
.insight-icon { font-size:26px; margin-bottom:12px; }
.insight-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:8px; }
.insight-body { font-size:13px; color:var(--text-muted); line-height:1.7; }

/* ---- QUOTE ---- */
.quote-block {
  border-left:3px solid var(--gold);
  padding:16px 20px;
  background:rgba(200,164,74,0.05);
  border-radius:0 6px 6px 0;
  margin:20px 0;
}
.quote-text { font-size:15px; color:var(--text); line-height:1.8; font-style:italic; margin-bottom:8px; }
.quote-attr { font-size:11px; color:var(--gold); letter-spacing:1px; }

/* ---- FRAMEWORK ---- */
.framework-box {
  background:rgba(26,140,122,0.07); border:1px solid rgba(26,140,122,0.3);
  border-radius:10px; padding:28px; margin-bottom:28px;
}
.framework-title {
  font-size:13px; font-weight:700; color:#1a8c7a;
  letter-spacing:1px; text-transform:uppercase; margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.framework-body { display:flex; flex-direction:column; gap:12px; }
.framework-item {
  display:flex; gap:14px; align-items:flex-start;
}
.fw-num {
  width:26px; height:26px; border-radius:50%;
  background:rgba(26,140,122,0.2); border:1px solid rgba(26,140,122,0.4);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#1a8c7a; flex-shrink:0;
}
.fw-content { font-size:13px; color:var(--text-muted); line-height:1.6; flex:1; }
.fw-content strong { color:var(--text); }

/* ---- TIPS TABLE ---- */
.tips-table { width:100%; border-collapse:collapse; margin-bottom:28px; }
.tips-table th {
  background:rgba(200,164,74,0.1); border:1px solid var(--border);
  padding:12px 16px; font-size:11px; color:var(--gold);
  letter-spacing:1px; text-transform:uppercase; text-align:left;
}
.tips-table td {
  border:1px solid rgba(255,255,255,0.06);
  padding:12px 16px; font-size:13px; color:var(--text-muted); vertical-align:top;
}
.tips-table tr:hover td { background:rgba(200,164,74,0.04); color:var(--text); }
.tips-table td strong { color:var(--gold); }
.tips-table td .highlight { color:#fff; font-weight:700; }

/* ---- MECHANISM ---- */
.mechanism-flow {
  display:flex; align-items:stretch; gap:0;
  overflow-x:auto; margin:20px 0 32px;
}
.mf-step {
  flex:1; min-width:120px; background:var(--card-bg);
  border:1px solid var(--border); border-radius:0;
  padding:16px 14px; text-align:center; position:relative;
}
.mf-step:first-child { border-radius:8px 0 0 8px; }
.mf-step:last-child { border-radius:0 8px 8px 0; }
.mf-step::after {
  content:'→'; position:absolute; right:-14px; top:50%;
  transform:translateY(-50%); color:var(--gold); font-size:16px; z-index:1;
}
.mf-step:last-child::after { display:none; }
.mf-icon { font-size:20px; margin-bottom:6px; }
.mf-label { font-size:11px; color:var(--gold); letter-spacing:0.5px; margin-bottom:4px; }
.mf-text { font-size:12px; color:var(--text-muted); line-height:1.4; }

/* ---- STAT BANNER ---- */
.stat-banner {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1px; overflow:hidden; border:1px solid var(--border); border-radius:8px;
  background:var(--border); margin:28px 0;
}
.stat-cell { padding:20px; text-align:center; background:rgba(13,27,46,0.8); }
.stat-num { font-size:30px; font-weight:300; color:#fff; line-height:1; margin-bottom:4px; }
.stat-num b { font-size:15px; }
.stat-label { font-size:10px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; }

/* ---- VC PERSPECTIVE ---- */
.vc-box {
  background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(30,50,80,0.7));
  border:1px solid rgba(124,58,237,0.3); border-radius:10px;
  padding:28px; margin-top:40px;
}
.vc-title {
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:#c4b5fd; margin-bottom:16px; display:flex; align-items:center; gap:8px;
}
.vc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
.vc-item {
  background:rgba(124,58,237,0.08); border:1px solid rgba(124,58,237,0.2);
  border-radius:6px; padding:16px;
}
.vc-item-label { font-size:10px; color:#c4b5fd; letter-spacing:1px; margin-bottom:6px; }
.vc-item-text { font-size:13px; color:var(--text-muted); line-height:1.6; }

/* ---- ACCORDION ---- */
.accordion { margin-bottom:12px; }
.accordion-header {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:6px; padding:16px 20px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  user-select:none; transition:all 0.2s;
}
.accordion-header:hover { border-color:rgba(200,164,74,0.4); }
.accordion-header.open { border-color:var(--gold); border-radius:6px 6px 0 0; }
.accordion-title { font-size:14px; font-weight:600; color:#fff; }
.accordion-chevron { color:var(--text-muted); transition:transform 0.25s; font-size:14px; }
.accordion-header.open .accordion-chevron { transform:rotate(180deg); color:var(--gold); }
.accordion-body {
  background:rgba(13,27,46,0.6); border:1px solid var(--gold);
  border-top:none; border-radius:0 0 6px 6px; padding:20px 24px;
  font-size:13px; color:var(--text-muted); line-height:1.8;
}

/* ---- COMPARISON TABLE ---- */
.compare-table { width:100%; border-collapse:collapse; margin:20px 0 32px; }
.compare-table th {
  background:rgba(37,99,235,0.12); border:1px solid var(--border);
  padding:12px 16px; font-size:12px; color:#93c5fd; text-align:left;
}
.compare-table td {
  border:1px solid rgba(255,255,255,0.06);
  padding:12px 16px; font-size:13px; color:var(--text-muted); vertical-align:top;
}
.compare-table tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.compare-table td.good { color:#86efac; }
.compare-table td.warn { color:#fbbf24; }
.compare-table td.bad { color:#f87171; }

/* ---- CHECKLIST ---- */
.checklist { list-style:none; display:flex; flex-direction:column; gap:8px; margin:16px 0; }
.checklist li {
  display:flex; gap:10px; align-items:flex-start;
  font-size:13px; color:var(--text-muted); line-height:1.5;
}
.checklist li::before {
  content:'✓'; color:var(--teal); font-weight:700; flex-shrink:0; margin-top:1px;
}
.checklist li.warn::before { content:'⚠'; color:var(--amber); }
.checklist li.x::before { content:'✕'; color:var(--red); }

/* ---- PILL TAG ---- */
.pill {
  display:inline-block; padding:3px 10px; border-radius:12px;
  font-size:11px; font-weight:600; letter-spacing:0.5px; margin-right:6px; margin-bottom:4px;
}
.pill-gold { background:rgba(200,164,74,0.15); color:var(--gold); border:1px solid rgba(200,164,74,0.3); }
.pill-teal { background:rgba(26,140,122,0.15); color:#34d399; border:1px solid rgba(26,140,122,0.3); }
.pill-blue { background:rgba(37,99,235,0.15); color:#93c5fd; border:1px solid rgba(37,99,235,0.3); }
.pill-red { background:rgba(220,38,38,0.15); color:#fca5a5; border:1px solid rgba(220,38,38,0.3); }
.pill-purple { background:rgba(124,58,237,0.15); color:#c4b5fd; border:1px solid rgba(124,58,237,0.3); }

/* ---- ALERT BOX ---- */
.alert { border-radius:6px; padding:14px 18px; margin:16px 0; font-size:13px; line-height:1.7; }
.alert-gold { background:rgba(200,164,74,0.08); border-left:3px solid var(--gold); color:var(--text-muted); }
.alert-gold strong { color:var(--gold); display:block; margin-bottom:4px; }
.alert-red { background:var(--red-light); border-left:3px solid var(--red); color:#fca5a5; }
.alert-red strong { color:#f87171; display:block; margin-bottom:4px; }
.alert-teal { background:var(--teal-light); border-left:3px solid var(--teal); color:var(--text-muted); }
.alert-teal strong { color:#34d399; display:block; margin-bottom:4px; }

/* ---- BG VARIANTS ---- */
.bg-alt { background:rgba(255,255,255,0.015); }
.bg-gold { background:linear-gradient(180deg,rgba(200,164,74,0.06) 0%,transparent 100%); }

/* ---- DIVIDER ---- */
.divider { border:none; border-top:1px solid var(--border); margin:40px 0; }

/* ---- FOOTER ---- */
footer {
  background:rgba(0,0,0,0.4); text-align:center; padding:24px;
  font-size:11px; color:var(--text-muted); border-top:1px solid var(--border);
}

@media(max-width:700px) {
  .section { padding:40px 20px; }
  .hero { padding:60px 20px; }
  .speaker-row { grid-template-columns:1fr; }
  .session-header { flex-direction:column; }
  .mechanism-flow { flex-direction:column; }
  .mf-step::after { content:'↓'; position:static; display:block; text-align:center; font-size:16px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ---------- 데이터 ---------- */
const SESSION1_INSIGHTS = [
  {
    icon: "🏦",
    title: "은행 vs VC — 완전히 다른 마인드셋",

  {

const SESSION2_INSIGHTS = [
  {

function Accordion({ items }) {
  const [open, setOpen] = useState(null);
  return (
    <div>
      {items.map((item, i) => (
        <div key={i} className="accordion">
          <div
            className={`accordion-header ${open === i ? 'open' : ''}`}
            onClick={() => setOpen(open === i ? null : i)}
          >
            <span className="accordion-title">{item.title}</span>
            <span className="accordion-chevron">{open === i ? '▲' : '▼'}</span>
          </div>
          {open === i && (
            <div className="accordion-body" style={{ whiteSpace: 'pre-line' }}>
              {item.content}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}
